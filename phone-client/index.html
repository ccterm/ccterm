<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CCTerm Remote</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:#0c0c0c; }
    body {
      display:flex; flex-direction:column; font-family:monospace;
      -webkit-tap-highlight-color:transparent;
      -webkit-user-select:none; user-select:none;
    }

    .header {
      display:flex; align-items:center; gap:6px; padding:6px 8px;
      background:#1f1f1f; border-bottom:1px solid #333; flex-shrink:0;
      overflow-x:auto; min-height:36px;
    }
    .header .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .header .dot.green { background:#16c60c; }
    .header .dot.yellow { background:#f9a825; }
    .header .dot.red { background:#e74856; }
    .tab-btn {
      padding:3px 10px; font-size:12px; color:#888; background:transparent;
      border:1px solid transparent; border-radius:4px; cursor:pointer;
      white-space:nowrap; flex-shrink:0;
    }
    .tab-btn.active { color:#0078d4; border-color:#0078d4; }
    .tab-add {
      padding:2px 8px; font-size:16px; color:#888; background:transparent;
      border:1px solid transparent; border-radius:4px; cursor:pointer;
      flex-shrink:0; line-height:1;
    }
    .tab-add:active { color:#fff; background:#2d2d2d; }

    .toolbar {
      display:flex; gap:4px; padding:4px 8px; flex-shrink:0;
      background:#1a1a1a; border-bottom:1px solid #2a2a2a;
    }
    .toolbar button {
      flex:1; padding:5px 0; font-size:11px; font-weight:600;
      letter-spacing:0.5px; background:#252525; border:1px solid #3a3a3a;
      border-radius:4px; color:#888; cursor:pointer;
    }
    .toolbar button.active { background:#0078d4; border-color:#0078d4; color:#fff; }

    .panel {
      display:none; flex-shrink:0; max-height:40vh; overflow-y:auto;
      background:#141414; border-bottom:1px solid #2a2a2a;
      -webkit-overflow-scrolling:touch;
    }
    .panel.open { display:block; }
    .panel-item {
      padding:8px 12px; font-size:12px; color:#aaa; border-bottom:1px solid #222;
      cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .panel-item:active { background:#0078d4; color:#fff; }
    .panel-item .muted { color:#666; font-size:10px; }
    .panel-empty { padding:16px; text-align:center; color:#555; font-size:12px; }
    .panel-dir { color:#569cd6; }

    .terminal {
      flex:1; overflow-y:auto; padding:4px 8px;
      font-family:'Cascadia Code','Consolas','Courier New',monospace;
      font-size:13px; line-height:1.4; color:#ccc;
      -webkit-overflow-scrolling:touch;
    }
    .terminal .line { white-space:pre; min-height:1.4em; word-break:break-all; }
    .terminal .line.cursor::after {
      content:''; display:inline-block; width:0.5em; height:1em;
      background:#ccc; vertical-align:text-bottom; animation:blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity:0; } }

    .input-area {
      display:flex; gap:4px; padding:6px 8px;
      background:#1f1f1f; border-top:1px solid #333; flex-shrink:0;
    }
    .input-area input {
      flex:1; padding:8px 10px; font-size:14px; font-family:'Cascadia Code','Consolas',monospace;
      background:#0c0c0c; border:1px solid #454545; border-radius:4px; color:#fff;
      outline:none; min-width:0;
    }
    .input-area input:focus { border-color:#0078d4; }
    .input-area button {
      padding:8px 10px; font-size:13px; background:#333; border:1px solid #454545;
      border-radius:4px; color:#ccc; cursor:pointer; white-space:nowrap;
      flex-shrink:0;
    }
    .input-area button:active { background:#0078d4; color:#fff; }
    .input-area button.enter-btn { background:#0078d4; border-color:#0078d4; color:#fff; }
    .input-area button.enter-btn:active { background:#1a8ad4; }

    .empty { display:flex; align-items:center; justify-content:center; height:100%;
              color:#666; font-size:14px; }
    .cwd-bar {
      padding:3px 8px; font-size:11px; color:#569cd6;
      border-bottom:1px solid #2a2a2a; white-space:nowrap; overflow:hidden;
      text-overflow:ellipsis;
    }

    .setup-overlay {
      position:fixed; top:0;left:0;right:0;bottom:0; z-index:100;
      display:flex; align-items:center; justify-content:center;
      background:#0c0c0c;
    }
    .setup-box { text-align:center; color:#ccc; padding:24px; }
    .setup-box h2 { margin-bottom:16px; font-size:18px; }
    .setup-box input {
      padding:10px 14px; font-size:14px; background:#1a1a1a; border:1px solid #454545;
      border-radius:6px; color:#fff; width:260px; text-align:center; outline:none;
    }
    .setup-box input:focus { border-color:#0078d4; }
    .setup-box button {
      margin-top:12px; padding:10px 28px; font-size:14px; background:#0078d4;
      border:none; border-radius:6px; color:#fff; cursor:pointer;
    }
    .setup-box .error { color:#e74856; margin-top:8px; font-size:12px; }

    .key-row {
      display:flex; gap:4px; padding:4px 8px 6px; flex-shrink:0;
      flex-wrap:wrap; justify-content:center;
    }
    .key-row button {
      padding:6px 8px; font-size:11px; font-family:monospace;
      background:#2a2a2a; border:1px solid #454545; border-radius:4px;
      color:#ccc; cursor:pointer; white-space:nowrap; min-width:28px;
    }
    .key-row button:active { background:#0078d4; color:#fff; }
    .key-row button.wide { min-width:48px; }
  </style>
</head>
<body>
  <div id="setup" class="setup-overlay">
    <div class="setup-box">
      <h2>CCTerm Remote</h2>
      <input id="tokenInput" type="text" placeholder="输入 Token（可选）" autocomplete="off" />
      <div id="tokenError" class="error"></div>
      <button onclick="connect()">连接</button>
    </div>
  </div>

  <div class="header" id="header" style="display:none">
    <div class="dot" id="statusDot"></div>
    <div id="tabButtons"></div>
    <button class="tab-add" onclick="createTab()" title="新建标签">+</button>
  </div>
  <div class="toolbar" id="toolbar" style="display:none">
    <button id="btnWorkspace" onclick="togglePanel('workspace')">WORKSPACE</button>
    <button id="btnHistory" onclick="togglePanel('history')">HISTORY</button>
  </div>
  <div class="panel" id="workspacePanel"></div>
  <div class="panel" id="historyPanel"></div>
  <div class="cwd-bar" id="cwdBar" style="display:none"></div>
  <div class="terminal" id="terminal"><div class="empty">连接中...</div></div>
  <div class="input-area" id="inputArea" style="display:none">
    <input type="text" id="cmdInput" placeholder="输入命令..." autocomplete="off" />
    <button onclick="sendCommand(false)" title="发送文本">发送</button>
    <button class="enter-btn" onclick="sendReturn()" title="回车">回车</button>
  </div>
  <div class="key-row" id="keyRow" style="display:none">
    <button onclick="sendKey('\x1b[H')" title="Home">Home</button>
    <button onclick="sendKey('\x1b[F')" title="End">End</button>
    <button onclick="sendKey('\x1b[A')" title="上箭头">↑</button>
    <button onclick="sendKey('\x1b[B')" title="下箭头">↓</button>
    <button onclick="sendKey('\x1b[D')" title="左箭头">←</button>
    <button onclick="sendKey('\x1b[C')" title="右箭头">→</button>
    <button onclick="sendKey('\x7f')" title="退格">⌫</button>
    <button onclick="sendKey('\x1b[3~')" title="删除">Del</button>
    <button class="wide" onclick="sendKey('\x1b[Z')" title="Shift+Tab">⇧Tab</button>
  </div>

  <script>
    let API_BASE = '';
    let TOKEN = '';
    let activeSessionId = '';
    let sessions = [];
    let lastSnapshotTime = 0;
    let pollTimer = null;
    let lastUpdate = 0;
    const inputHistory = [];
    let historyIdx = -1;
    let openPanel = null;
    let workspaceFolders = [];
    let historyRecords = [];

    // Read token from URL param
    const params = new URLSearchParams(location.search);
    const urlToken = params.get('token');
    if (urlToken) {
      document.getElementById('tokenInput').value = urlToken;
    }

    function authHeaders() {
      const h = {};
      if (TOKEN) h['Authorization'] = 'Bearer ' + TOKEN;
      return h;
    }

    function connect() {
      TOKEN = document.getElementById('tokenInput').value.trim();
      API_BASE = location.origin;

      Promise.all([
        fetch(API_BASE + '/api/sessions', { headers: authHeaders() }).then(r => r.json()),
        fetch(API_BASE + '/api/sessions/active', { headers: authHeaders() }).then(r => r.json())
      ])
        .then(([sessList, active]) => {
          sessions = sessList;
          document.getElementById('setup').style.display = 'none';
          document.getElementById('header').style.display = 'flex';
          document.getElementById('toolbar').style.display = 'flex';
          document.getElementById('cwdBar').style.display = 'block';
          document.getElementById('inputArea').style.display = 'flex';
          document.getElementById('keyRow').style.display = 'flex';
          document.getElementById('cmdInput').focus();

          if (sessions.length > 0) {
            const targetId = (active.sessionId && sessions.find(s => s.id === active.sessionId)) ? active.sessionId : sessions[0].id;
            switchTab(targetId, false);
          } else {
            document.getElementById('terminal').innerHTML = '<div class="empty">等待终端连接...</div>';
          }
          startPolling();
          loadWorkspace();
          loadHistory();
        })
        .catch(err => {
          document.getElementById('tokenError').textContent = err.message || '无法连接服务器';
        });
    }

    function createTab() {
      knownSessionIds = new Set(sessions.map(function(s) { return s.id; }));
      expectingNewSession = true;
      fetch(API_BASE + '/api/tabs', {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
        body: JSON.stringify({ shell: 'powershell' })
      }).catch(function() {});
    }

    let ignoreNextActivePoll = false;
    let expectingNewSession = false;
    let knownSessionIds = new Set();

    function switchTab(id, notifyServer) {
      activeSessionId = id;
      lastSnapshotTime = 0;
      fetchSnapshot();
      updateTabButtons();
      document.getElementById('cmdInput').focus();
      if (notifyServer !== false) {
        ignoreNextActivePoll = true;
        fetch(API_BASE + '/api/sessions/active', {
          method: 'POST',
          headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
          body: JSON.stringify({ sessionId: id })
        }).catch(() => {});
      }
    }

    function shortTabTitle(s) {
      return s.tabTitle || s.id;
    }

    function updateTabButtons() {
      const container = document.getElementById('tabButtons');
      container.innerHTML = sessions.map(function(s) {
        var title = shortTabTitle(s);
        return '<button class="tab-btn' + (s.id === activeSessionId ? ' active' : '') + '" onclick="switchTab(\'' + s.id + '\')">' + escHtml(title) + '</button>';
      }).join('');
    }

    function togglePanel(name) {
      const panel = document.getElementById(name === 'workspace' ? 'workspacePanel' : 'historyPanel');
      const btn = document.getElementById(name === 'workspace' ? 'btnWorkspace' : 'btnHistory');
      if (openPanel === name) {
        panel.classList.remove('open');
        btn.classList.remove('active');
        openPanel = null;
      } else {
        // Close other panel
        if (openPanel) {
          document.getElementById(openPanel === 'workspace' ? 'workspacePanel' : 'historyPanel').classList.remove('open');
          document.getElementById(openPanel === 'workspace' ? 'btnWorkspace' : 'btnHistory').classList.remove('active');
        }
        panel.classList.add('open');
        btn.classList.add('active');
        openPanel = name;
        if (name === 'workspace') loadWorkspace();
        if (name === 'history') loadHistory();
      }
    }

    function loadWorkspace() {
      fetch(API_BASE + '/api/workspace', { headers: authHeaders() })
        .then(r => r.json())
        .then(folders => {
          workspaceFolders = folders || [];
          renderWorkspace();
        }).catch(() => {});
    }

    function normPath(p) {
      return (p || '').replace(/\\/g, '/').replace(/\/+$/, '').toLowerCase();
    }

    function renderWorkspace() {
      const panel = document.getElementById('workspacePanel');
      if (workspaceFolders.length === 0) {
        panel.innerHTML = '<div class="panel-empty">没有工作区文件夹</div>';
        return;
      }
      panel.innerHTML = workspaceFolders.map(function(f, i) {
        const nf = normPath(f);
        const match = sessions.find(function(s) { return s.cwd && normPath(s.cwd).startsWith(nf); });
        const marker = match ? ' <span style="color:#16c60c;font-size:10px">●</span>' : '';
        return '<div class="panel-item panel-dir" onclick="switchToFolder(' + i + ')">📁 ' + escHtml(f) + marker + '</div>';
      }).join('');
    }

    function switchToFolder(index) {
      // Tell desktop to activate this workspace folder
      fetch(API_BASE + '/api/workspace/activate', {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
        body: JSON.stringify({ index: index })
      }).catch(function() {});

      // Also switch phone to matching session if any
      var dir = workspaceFolders[index];
      if (dir) {
        var nd = normPath(dir);
        var match = sessions.find(function(s) { return s.cwd && normPath(s.cwd).startsWith(nd); });
        if (match) {
          switchTab(match.id);
        }
      }

      if (openPanel) {
        document.getElementById(openPanel === 'workspace' ? 'workspacePanel' : 'historyPanel').classList.remove('open');
        document.getElementById(openPanel === 'workspace' ? 'btnWorkspace' : 'btnHistory').classList.remove('active');
        openPanel = null;
      }
    }

    function loadHistory() {
      fetch(API_BASE + '/api/history?limit=100', { headers: authHeaders() })
        .then(r => r.json())
        .then(records => {
          historyRecords = records || [];
          renderHistory();
        }).catch(() => {});
    }

    function renderHistory() {
      const panel = document.getElementById('historyPanel');
      if (historyRecords.length === 0) {
        panel.innerHTML = '<div class="panel-empty">没有历史记录</div>';
        return;
      }
      panel.innerHTML = historyRecords.map(r => {
        const time = new Date(r.timestamp).toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
        const cmd = escHtml(r.command);
        return `<div class="panel-item" onclick="insertCmd('${escAttr(r.command)}')">
          <div>${cmd}</div>
          <span class="muted">${time}  ${escHtml(r.directory || '')}</span>
        </div>`;
      }).join('');
    }

    function insertCmd(cmd) {
      const input = document.getElementById('cmdInput');
      input.value = cmd;
      input.focus();
    }

    function startPolling() {
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(poll, 2000);
    }

    function poll() {
      fetchSnapshot();
      fetchSessions();
      fetchActiveSession();
      updateStatus();
    }

    function fetchActiveSession() {
      fetch(API_BASE + '/api/sessions/active', { headers: authHeaders() })
        .then(r => r.json())
        .then(data => {
          if (ignoreNextActivePoll) { ignoreNextActivePoll = false; return; }
          if (data.sessionId && data.sessionId !== activeSessionId && sessions.find(s => s.id === data.sessionId)) {
            switchTab(data.sessionId, false);
          }
        }).catch(() => {});
    }

    function fetchSnapshot() {
      fetch(API_BASE + '/api/sessions/' + activeSessionId + '/snapshot', { headers: authHeaders() })
        .then(r => r.json())
        .then(snap => {
          if (!snap || !snap.lines) {
            if (document.getElementById('terminal').children.length === 1 &&
                document.getElementById('terminal').children[0].classList.contains('empty')) {
              // still waiting
            }
            return;
          }
          if (snap.timestamp === lastSnapshotTime) return;
          lastSnapshotTime = snap.timestamp;
          lastUpdate = Date.now();
          renderSnapshot(snap);
        })
        .catch(() => {});
    }

    function fetchSessions() {
      fetch(API_BASE + '/api/sessions', { headers: authHeaders() })
        .then(r => r.json())
        .then(data => {
          // If we're expecting a new session (from createTab), switch to it
          if (expectingNewSession) {
            var newSession = null;
            for (var i = 0; i < data.length; i++) {
              if (!knownSessionIds.has(data[i].id)) {
                newSession = data[i];
                break;
              }
            }
            if (newSession) {
              expectingNewSession = false;
              sessions = data;
              updateTabButtons();
              switchTab(newSession.id);
              return;
            }
          }

          if (data.length !== sessions.length ||
              JSON.stringify(data.map(function(s){ return s.id; }).sort()) !== JSON.stringify(sessions.map(function(s){ return s.id; }).sort())) {
            sessions = data;
            updateTabButtons();
            if (!sessions.find(function(s) { return s.id === activeSessionId; }) && sessions.length > 0) {
              switchTab(sessions[0].id);
            }
          }
        })
        .catch(function() {});
    }

    function renderSnapshot(snap) {
      const terminal = document.getElementById('terminal');
      const cwdBar = document.getElementById('cwdBar');
      if (snap.cwd) cwdBar.textContent = snap.cwd;

      let html = '';
      for (let i = 0; i < snap.lines.length; i++) {
        const line = snap.lines[i];
        const isCursor = i === snap.cursorRow;
        const cls = isCursor ? 'line cursor' : 'line';
        const text = line ? escHtml(line.text) : '';
        if (line && line.fg && line.fg !== 7) {
          html += `<div class="${cls}" style="color:${ansiToCss(line.fg)}">${text}</div>`;
        } else {
          html += `<div class="${cls}">${text}</div>`;
        }
      }
      terminal.innerHTML = html;
      terminal.scrollTop = terminal.scrollHeight;
    }

    function ansiToCss(code) {
      const map = {
        0: '#0c0c0c', 1: '#c50f1f', 2: '#13a10e', 3: '#c19c00',
        4: '#0037da', 5: '#881798', 6: '#3a96dd', 7: '#cccccc',
        8: '#767676', 9: '#e74856', 10: '#16c60c', 11: '#f9f1a5',
        12: '#3b78ff', 13: '#b4009e', 14: '#61d6d6', 15: '#f2f2f2'
      };
      return map[code] || '#ccc';
    }

    function updateStatus() {
      const dot = document.getElementById('statusDot');
      const ago = Date.now() - lastUpdate;
      dot.className = 'dot ' + (ago < 5000 ? 'green' : ago < 15000 ? 'yellow' : 'red');
    }

    function sendCommand(sendEnter) {
      const input = document.getElementById('cmdInput');
      const text = input.value;
      if (!text && !sendEnter) return;

      if (text) {
        inputHistory.push(text);
        historyIdx = inputHistory.length;
      }

      fetch(API_BASE + '/api/sessions/' + activeSessionId + '/commands', {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
        body: JSON.stringify({ text: text || '', sendEnter })
      }).catch(() => {});

      input.value = '';
      input.focus();
    }

    function sendReturn() {
      fetch(API_BASE + '/api/sessions/' + activeSessionId + '/commands', {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
        body: JSON.stringify({ text: '', sendEnter: true })
      }).catch(() => {});
      document.getElementById('cmdInput').focus();
    }

    function sendKey(seq) {
      fetch(API_BASE + '/api/sessions/' + activeSessionId + '/commands', {
        method: 'POST',
        headers: Object.assign({ 'Content-Type': 'application/json' }, authHeaders()),
        body: JSON.stringify({ text: seq, sendEnter: false })
      }).catch(() => {});
      document.getElementById('cmdInput').focus();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escAttr(s) {
      return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;');
    }

    // Input history navigation
    document.getElementById('cmdInput').addEventListener('keydown', function(e) {
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (inputHistory.length === 0) return;
        if (historyIdx > 0) historyIdx--;
        this.value = inputHistory[historyIdx] || '';
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIdx < inputHistory.length - 1) {
          historyIdx++;
          this.value = inputHistory[historyIdx] || '';
        } else {
          historyIdx = inputHistory.length;
          this.value = '';
        }
      } else if (e.key === 'Enter') {
        e.preventDefault();
        sendCommand(true);
      }
    });
  </script>
</body>
</html>
